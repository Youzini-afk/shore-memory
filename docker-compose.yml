version: '3.8'

services:
  pero-core:
    build: .
    image: pero-core:latest
    container_name: pero-core
    ports:
      - "9000:9000"
    volumes:
      - ./data:/app/backend/data
      - ./logs:/app/logs
      # Map host napcat config if needed, or run napcat separately
    environment:
      - PORT=9000
      - TZ=Asia/Shanghai
      - HEADLESS=true
      # - ENABLE_SOCIAL_MODE=true # Uncomment to enable social features
    restart: unless-stopped
    # If using external NapCat:
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"

#  # Optional: Run NapCat in a separate container (if social mode requires it)
