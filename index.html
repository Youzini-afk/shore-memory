<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 本地字体加载（避免依赖 Google Fonts CDN，解决中国网络/离线环境下阻塞渲染的问题） -->
    <style>
      @font-face {
        font-family: 'ZCOOL KuaiLe';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url('./fonts/ZCOOLKuaiLe-Regular.woff2') format('woff2');
      }
      @font-face {
        font-family: 'DotGothic16';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url('./fonts/DotGothic16-Regular.woff2') format('woff2');
      }
    </style>
    <script>
      window.startTime = Date.now()
      console.log('[Perf] index.html parsing at ' + window.startTime)

      // Global Error Handler for Black Screen Debugging
      window.onerror = function (message, source, lineno, colno, error) {
        var div = document.createElement('div')
        div.style.position = 'fixed'
        div.style.top = '0'
        div.style.left = '0'
        div.style.width = '100%'
        div.style.height = '100%'
        div.style.backgroundColor = 'rgba(0,0,0,0.85)'
        div.style.color = '#ff5555'
        div.style.zIndex = '999999'
        div.style.padding = '20px'
        div.style.fontFamily = 'monospace'
        div.style.whiteSpace = 'pre-wrap'
        div.style.overflow = 'auto'
        div.innerText =
          'CRITICAL ERROR:\n' +
          message +
          '\n\nSource: ' +
          source +
          ':' +
          lineno +
          ':' +
          colno +
          '\n\nStack:\n' +
          (error ? error.stack : 'N/A')
        document.body.appendChild(div)
      }

      window.addEventListener('unhandledrejection', function (event) {
        var div = document.createElement('div')
        div.style.position = 'fixed'
        div.style.top = '50%'
        div.style.left = '0'
        div.style.width = '100%'
        div.style.height = '50%'
        div.style.backgroundColor = 'rgba(0,0,0,0.85)'
        div.style.color = '#ffaa55'
        div.style.zIndex = '999999'
        div.style.padding = '20px'
        div.style.fontFamily = 'monospace'
        div.style.whiteSpace = 'pre-wrap'
        div.style.overflow = 'auto'
        div.innerText = 'UNHANDLED PROMISE REJECTION:\n' + event.reason
        document.body.appendChild(div)
      })
    </script>
    <title>萌动链接：PeroperoChat！</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
