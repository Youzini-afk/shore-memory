name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Electron App
    runs-on: windows-latest

    steps:
      - name: Checkout PeroCore-Electron
        uses: actions/checkout@v4
        with:
          path: PeroCore-Electron

      # [已移除] Go Gateway 构建 — Gateway 已嵌入 Python 后端 (2026-03-20)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('PeroCore-Electron/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Python for Dependency Installation
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Python Environment
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          # 1. Download Embedded Python
          $Url = "https://www.python.org/ftp/python/3.10.11/python-3.10.11-embed-amd64.zip"
          $ZipPath = "python.zip"
          $Dest = "PeroCore-Electron/resources/python"

          echo "Downloading Python..."
          Invoke-WebRequest -Uri $Url -OutFile $ZipPath

          echo "Extracting Python..."
          New-Item -ItemType Directory -Force -Path $Dest
          Expand-Archive -Path $ZipPath -DestinationPath $Dest -Force

          # 2. Configure .pth to enable site-packages and Lib
          $PthFile = "$Dest/python310._pth"
          $Content = @(
            "python310.zip",
            ".",
            "Lib/site-packages",
            "import site"
          )
          # [关键修复] PowerShell 5.x 的 -Encoding UTF8 会写入 BOM 字符(\ufeff)，
          # utf8NoBOM 枚举值仅在 PowerShell 6+ 存在，GitHub Actions 用的是 PowerShell 5.1。
          # Python 的 .pth 解析器不识别 BOM，导致路径变成 \ufeffpython310.zip，
          # 进而使 encodings 模块找不到，Python 解释器完全无法启动！
          # 必须通过 .NET 的 UTF8Encoding($false) 写入纯净的 UTF-8 文件（全版本兼容）。
          $Utf8NoBom = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::WriteAllLines((Resolve-Path $PthFile), $Content, $Utf8NoBom)

          # 3. Install Dependencies via uv
          echo "Installing dependencies..."
          $SitePackages = (New-Item -ItemType Directory -Force -Path "$Dest/Lib/site-packages").FullName
          echo "Site-packages absolute path: $SitePackages"

          # Use pip to install uv first
          pip install uv
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          # Install torch first (CPU only)
          uv pip install --target $SitePackages torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu --system
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          # Install dependencies from pyproject.toml
          Push-Location PeroCore-Electron/backend
          uv pip install --target $SitePackages . --system
          if ($LASTEXITCODE -ne 0) { Pop-Location; exit $LASTEXITCODE }
          Pop-Location

          # Clean up
          Remove-Item $ZipPath

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'PeroCore-Electron -> target'

      - name: Build and Install Rust Python Extensions (maturin)
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          pip install maturin
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $TARGET_LIB = "PeroCore-Electron/resources/python/Lib/site-packages"

          # Build pero_vision_core (.pyd Python extension)
          echo "Building pero_vision_core..."
          maturin build --release --manifest-path PeroCore-Electron/backend/vision_core/Cargo.toml --out dist
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $VISION_WHEEL = Get-ChildItem dist/pero_vision_core*.whl | Select-Object -First 1
          if (-not $VISION_WHEEL) { Write-Error "pero_vision_core wheel not found"; exit 1 }
          pip install $VISION_WHEEL.FullName --target $TARGET_LIB --no-deps --force-reinstall
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          echo "pero_vision_core installed."

          # Build nit_rust_runtime (.pyd Python extension)
          echo "Building nit_rust_runtime..."
          maturin build --release --manifest-path PeroCore-Electron/backend/nit_core/interpreter/rust_binding/Cargo.toml --out dist
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $NIT_WHEEL = Get-ChildItem dist/nit_rust_runtime*.whl | Select-Object -First 1
          if (-not $NIT_WHEEL) { Write-Error "nit_rust_runtime wheel not found"; exit 1 }
          pip install $NIT_WHEEL.FullName --target $TARGET_LIB --no-deps --force-reinstall
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          echo "nit_rust_runtime installed."

      - name: Build Binary Tools
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          # 1. Build CodeSearcher Tool
          echo "Building CodeSearcher Tool..."
          cargo build --release --manifest-path PeroCore-Electron/backend/nit_core/tools/work/CodeSearcher/src/Cargo.toml
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          # Root Workspace always outputs to PeroCore-Electron/target/
          $BIN = "PeroCore-Electron/target/release/CodeSearcher.exe"
          if (!(Test-Path $BIN)) { Write-Error "CodeSearcher.exe not found at $BIN"; exit 1 }
          Copy-Item $BIN "PeroCore-Electron/backend/nit_core/tools/work/CodeSearcher/CodeSearcher.exe" -Force
          echo "CodeSearcher installed."

          # 2. nit_terminal_auditor -- WASM module
          echo "Building nit_terminal_auditor (wasm32)..."
          cargo build --release --target wasm32-unknown-unknown --manifest-path PeroCore-Electron/backend/nit_core/nit_terminal_auditor/Cargo.toml
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $WASM = "PeroCore-Electron/target/wasm32-unknown-unknown/release/nit_terminal_auditor.wasm"
          if (!(Test-Path $WASM)) { Write-Error "nit_terminal_auditor.wasm not found at $WASM"; exit 1 }
          Copy-Item $WASM "PeroCore-Electron/backend/nit_core/tools/work/TerminalExecutor/auditor.wasm" -Force
          echo "auditor.wasm installed."

      - name: Install Dependencies
        run: |
          cd PeroCore-Electron
          pnpm install

      - name: Verify Critical Modules
        run: |
          cd PeroCore-Electron
          node -e "try { require('electron-store'); console.log('electron-store OK') } catch(e) { console.error('FAIL:', e.message); process.exit(1) }"
          node -e "try { require('axios'); console.log('axios OK') } catch(e) { console.error('FAIL:', e.message); process.exit(1) }"
          node -e "try { require('fs-extra'); console.log('fs-extra OK') } catch(e) { console.error('FAIL:', e.message); process.exit(1) }"
          node -e "const p = require.resolve('steamworks.js'); console.log('steamworks.js resolved:', p)"

      - name: Build Electron App (Setup Installer)
        run: |
          cd PeroCore-Electron
          pnpm run build:electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Portable Version
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'

          # Locate the unpacked directory from electron-builder
          $UNPACKED_DIR = "PeroCore-Electron/dist_electron/win-unpacked"

          if (!(Test-Path $UNPACKED_DIR)) {
            echo "win-unpacked directory not found, searching..."
            $candidates = Get-ChildItem "PeroCore-Electron/dist_electron" -Directory | Where-Object { $_.Name -like "*unpacked*" }
            if ($candidates.Count -gt 0) {
              $UNPACKED_DIR = $candidates[0].FullName
              echo "Found: $UNPACKED_DIR"
            } else {
              Write-Error "Cannot find unpacked directory! electron-builder may not have produced dir output."
              exit 1
            }
          }

          # 1. Create .portable marker file (activates portable data path)
          New-Item -ItemType File -Force -Path "$UNPACKED_DIR/.portable" | Out-Null
          echo "Created .portable marker file"

          # 2. Create data directory (user data will be stored here)
          New-Item -ItemType Directory -Force -Path "$UNPACKED_DIR/data" | Out-Null
          echo "Created data/ directory"

          # 3. Get version number for filename
          $VERSION = (Get-Content "PeroCore-Electron/package.json" | ConvertFrom-Json).version
          $ZIP_NAME = "PeroCore-Portable-v${VERSION}.zip"

          # 4. Compress into zip
          echo "Compressing portable version..."
          Compress-Archive -Path "$UNPACKED_DIR/*" -DestinationPath $ZIP_NAME -Force
          echo "Portable version packaged: $ZIP_NAME"

      - name: Package Browser Extension
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $EXT_DIR = "PeroCore-Electron/browser_extension"
          $ZIP_NAME = "PeroCore-Browser-Extension.zip"
          Compress-Archive -Path "$EXT_DIR/*" -DestinationPath $ZIP_NAME -Force
          echo "Browser extension packaged at $ZIP_NAME"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PeroCore-Windows
          path: |
            PeroCore-Electron/dist_electron/*.exe
            PeroCore-Portable-*.zip
            PeroCore-Browser-Extension.zip


      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            PeroCore-Electron/dist_electron/*.exe
            PeroCore-Portable-*.zip
            PeroCore-Browser-Extension.zip
          name: '萌动链接：PeroperoChat！ ${{ github.ref_name }}'
          body: |
            ## 🎉 ${{ github.ref_name }} 版本更新

            > 萌动链接：PeroperoChat！是一款开源的 AI 桌面伴侣应用，集成本地大模型、3D 桌宠、Plugin 系统与多智能体框架。

            ---

            ### 📦 下载说明

            | 文件 | 说明 | 推荐人群 |
            |------|------|----------|
            | `*-Setup-*.exe` | 安装版 | 普通用户，数据存储在系统用户目录 |
            | `PeroCore-Portable-*.zip` | 便携版（解压即用） | 随身携带或多设备使用，数据存储于 `data/` 文件夹 |
            | `PeroCore-Browser-Extension.zip` | 浏览器扩展 | 配合主程序在浏览器中使用 |

            > ⚠️ Windows 可能弹出 SmartScreen 警告，点击"仍要运行"即可。本软件为开源项目，源码可在仓库中查阅。

            ---

            ### 🆕 本版本更新内容

            #### ✨ 新特性
            - 请查阅本次 Commit 记录了解具体变更

            #### 🐛 问题修复
            - 请查阅本次 Commit 记录了解具体变更

            #### 🏗️ 架构优化
            - 请查阅本次 Commit 记录了解具体变更

            ---

            ### 🚀 快速开始

            1. 下载并安装（安装版）或解压（便携版）
            2. 首次启动需同意《用户许可协议》
            3. 在启动器中配置 LLM API Key 后即可使用
            4. 详细使用文档请参阅 [项目 Wiki](https://github.com/${{ github.repository }}/wiki)

            ---

            *由 GitHub Actions 自动构建发布 · 构建时间：${{ github.event.head_commit.timestamp }}*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

