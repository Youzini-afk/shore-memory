name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Electron App
    runs-on: windows-latest

    steps:
      - name: Checkout PeroCore-Electron
        uses: actions/checkout@v4
        with:
          path: PeroCore-Electron

      # [已移除] Go Gateway 构建 — Gateway 已嵌入 Python 后端 (2026-03-20)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('PeroCore-Electron/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Python for Dependency Installation
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Python Environment
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          # 1. Download Embedded Python
          $Url = "https://www.python.org/ftp/python/3.10.11/python-3.10.11-embed-amd64.zip"
          $ZipPath = "python.zip"
          $Dest = "PeroCore-Electron/resources/python"

          echo "Downloading Python..."
          Invoke-WebRequest -Uri $Url -OutFile $ZipPath

          echo "Extracting Python..."
          New-Item -ItemType Directory -Force -Path $Dest
          Expand-Archive -Path $ZipPath -DestinationPath $Dest -Force

          # 2. Configure .pth to enable site-packages and Lib
          $PthFile = "$Dest/python310._pth"
          $Content = @(
            "python310.zip",
            ".",
            "Lib/site-packages",
            "import site"
          )
          $Content | Set-Content $PthFile -Encoding UTF8

          # 3. Install Dependencies via uv
           echo "Installing dependencies..."
           $SitePackages = "$Dest/Lib/site-packages"
           New-Item -ItemType Directory -Force -Path $SitePackages
           
           # Use pip to install uv first
           pip install uv
           if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

           # Install torch first (CPU only)
           uv pip install --target $SitePackages torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu --system
           if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
           
           # Install dependencies from pyproject.toml
           # Note: uv pip install . needs to run where pyproject.toml is
           cd PeroCore-Electron/backend
           uv pip install --target $SitePackages . --system
           if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          # Clean up
           cd ../..
           Remove-Item $ZipPath

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'PeroCore-Electron -> target'

      - name: Build and Install Rust Core Extensions
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          pip install maturin
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $TARGET_LIB = "PeroCore-Electron/resources/python/Lib/site-packages"

          # 1. Build and Install pero_memory_core
          echo "Building pero_memory_core..."
          maturin build --release --manifest-path PeroCore-Electron/backend/rust_core/Cargo.toml --out dist
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $MEMORY_WHEEL = Get-ChildItem dist/pero_memory_core*.whl | Select-Object -First 1
          if ($MEMORY_WHEEL) {
              echo "Installing $($MEMORY_WHEEL.Name)..."
              pip install $MEMORY_WHEEL.FullName --target $TARGET_LIB --no-deps --force-reinstall
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          } else {
              Write-Error "Failed to build pero_memory_core wheel"
              exit 1
          }

          # 2. Build and Install pero_vision_core
          echo "Building pero_vision_core..."
          maturin build --release --manifest-path PeroCore-Electron/backend/vision_core/Cargo.toml --out dist
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $VISION_WHEEL = Get-ChildItem dist/pero_vision_core*.whl | Select-Object -First 1
          if ($VISION_WHEEL) {
              echo "Installing $($VISION_WHEEL.Name)..."
              pip install $VISION_WHEEL.FullName --target $TARGET_LIB --no-deps --force-reinstall
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          } else {
              Write-Error "Failed to build pero_vision_core wheel"
              exit 1
          }

          # 3. Build and Install nit_rust_runtime
          echo "Building nit_rust_runtime..."
          maturin build --release --manifest-path PeroCore-Electron/backend/nit_core/interpreter/rust_binding/Cargo.toml --out dist
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $NIT_WHEEL = Get-ChildItem dist/nit_rust_runtime*.whl | Select-Object -First 1
          if ($NIT_WHEEL) {
              echo "Installing $($NIT_WHEEL.Name)..."
              pip install $NIT_WHEEL.FullName --target $TARGET_LIB --no-deps --force-reinstall
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          } else {
              Write-Error "Failed to build nit_rust_runtime wheel"
              exit 1
          }

          # 4. Build and Install pero_social_core
          echo "Building pero_social_core..."
          maturin build --release --manifest-path PeroCore-Electron/backend/social_core/Cargo.toml --out dist
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $SOCIAL_WHEEL = Get-ChildItem dist/pero_social_core*.whl | Select-Object -First 1
          if ($SOCIAL_WHEEL) {
              echo "Installing $($SOCIAL_WHEEL.Name)..."
              pip install $SOCIAL_WHEEL.FullName --target $TARGET_LIB --no-deps --force-reinstall
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          } else {
              Write-Error "Failed to build pero_social_core wheel"
              exit 1
          }

      - name: Build Binary Tools
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          # 1. Build CodeSearcher Tool
          echo "Building CodeSearcher Tool..."
          cargo build --release --manifest-path PeroCore-Electron/backend/nit_core/tools/work/CodeSearcher/src/Cargo.toml
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $SEARCHER_SRC_DIR = "PeroCore-Electron/backend/nit_core/tools/work/CodeSearcher/src"
          $SEARCHER_TARGET_DIR = "PeroCore-Electron/backend/nit_core/tools/work/CodeSearcher"

          # Try to find the built binary.
          # Cargo workspace outputs to workspace root target/ by default
          $SEARCHER_BIN = Get-ChildItem -Path "PeroCore-Electron/target/release/CodeSearcher.exe" -ErrorAction SilentlyContinue
          if (-not $SEARCHER_BIN) {
               $SEARCHER_BIN = Get-ChildItem -Path "$SEARCHER_SRC_DIR/target/release/CodeSearcher.exe" -ErrorAction SilentlyContinue
          }
          if (-not $SEARCHER_BIN) {
               $SEARCHER_BIN = Get-ChildItem -Path "$SEARCHER_SRC_DIR/../target/release/CodeSearcher.exe" -ErrorAction SilentlyContinue
          }

          if ($SEARCHER_BIN) {
              echo "Found CodeSearcher binary at $($SEARCHER_BIN.FullName)"
              Copy-Item -Path $SEARCHER_BIN.FullName -Destination "$SEARCHER_TARGET_DIR/CodeSearcher.exe" -Force
          } else {
              Write-Error "CodeSearcher binary not found after build!"
              exit 1
          }

          # 2. Build nit_terminal_auditor (Wasm)
          echo "Building nit_terminal_auditor..."
          cargo build --release --target wasm32-unknown-unknown --manifest-path PeroCore-Electron/backend/nit_core/nit_terminal_auditor/Cargo.toml
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $WASM_SRC = "PeroCore-Electron/target/wasm32-unknown-unknown/release/nit_terminal_auditor.wasm"
          if (!(Test-Path $WASM_SRC)) {
              $WASM_SRC = "PeroCore-Electron/backend/nit_core/nit_terminal_auditor/target/wasm32-unknown-unknown/release/nit_terminal_auditor.wasm"
          }
          if (!(Test-Path $WASM_SRC)) {
              $WASM_SRC = "PeroCore-Electron/backend/nit_core/nit_terminal_auditor/target/release/nit_terminal_auditor.wasm" 
          }

          $WASM_TARGET_DIR = "PeroCore-Electron/backend/nit_core/tools/work/TerminalExecutor"

          if (Test-Path $WASM_SRC) {
              echo "Found Wasm binary at $WASM_SRC"
              Copy-Item -Path $WASM_SRC -Destination "$WASM_TARGET_DIR/auditor.wasm" -Force
          } else {
              Write-Error "nit_terminal_auditor.wasm not found after build!"
              exit 1
          }

      - name: Install Dependencies
        run: |
          cd PeroCore-Electron
          pnpm install

      - name: Verify Critical Modules
        run: |
          cd PeroCore-Electron
          node -e "try { require('electron-store'); console.log('electron-store OK') } catch(e) { console.error('FAIL:', e.message); process.exit(1) }"
          node -e "try { require('axios'); console.log('axios OK') } catch(e) { console.error('FAIL:', e.message); process.exit(1) }"
          node -e "try { require('fs-extra'); console.log('fs-extra OK') } catch(e) { console.error('FAIL:', e.message); process.exit(1) }"
          node -e "const p = require.resolve('steamworks.js'); console.log('steamworks.js resolved:', p)"

      - name: Build Electron App (Setup Installer)
        run: |
          cd PeroCore-Electron
          pnpm run build:electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Portable Version
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'

          # electron-builder --win --dir 的输出目录
          $UNPACKED_DIR = "PeroCore-Electron/dist_electron/win-unpacked"

          if (!(Test-Path $UNPACKED_DIR)) {
            echo "未找到 win-unpacked 目录，尝试查找..."
            $candidates = Get-ChildItem "PeroCore-Electron/dist_electron" -Directory | Where-Object { $_.Name -like "*unpacked*" }
            if ($candidates.Count -gt 0) {
              $UNPACKED_DIR = $candidates[0].FullName
              echo "找到: $UNPACKED_DIR"
            } else {
              Write-Error "找不到 unpacked 目录！electron-builder 可能未生成 dir 格式输出。"
              exit 1
            }
          }

          # 1. 创建 .portable 标记文件（激活便携数据路径）
          New-Item -ItemType File -Force -Path "$UNPACKED_DIR/.portable" | Out-Null
          echo "已创建 .portable 标记文件"

          # 2. 创建 data 目录（用户数据将存储于此）
          New-Item -ItemType Directory -Force -Path "$UNPACKED_DIR/data" | Out-Null
          echo "已创建 data/ 目录"

          # 3. 获取版本号用于文件名
          $VERSION = (Get-Content "PeroCore-Electron/package.json" | ConvertFrom-Json).version
          $ZIP_NAME = "PeroCore-Portable-v${VERSION}.zip"

          # 4. 打包为 zip
          echo "正在压缩便携版..."
          Compress-Archive -Path "$UNPACKED_DIR/*" -DestinationPath $ZIP_NAME -Force
          echo "便携版打包完成: $ZIP_NAME"

      - name: Package Browser Extension
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $EXT_DIR = "PeroCore-Electron/browser_extension"
          $ZIP_NAME = "PeroCore-Browser-Extension.zip"
          Compress-Archive -Path "$EXT_DIR/*" -DestinationPath $ZIP_NAME -Force
          echo "Browser extension packaged at $ZIP_NAME"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PeroCore-Windows
          path: |
            PeroCore-Electron/dist_electron/*.exe
            PeroCore-Portable-*.zip
            PeroCore-Browser-Extension.zip


      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            PeroCore-Electron/dist_electron/*.exe
            PeroCore-Portable-*.zip
            PeroCore-Browser-Extension.zip
          name: 'PeroCore ${{ github.ref_name }}'
          body: |
            ## ${{ github.ref_name }} Release Notes

            ### Downloads
            - **Setup 安装版** (`.exe`): 推荐大多数用户使用，数据存储在系统用户目录
            - **Portable 便携版** (`.zip`): 解压即用，数据存储在程序目录下的 `data/` 文件夹中
            - **Browser Extension** (`.zip`): 浏览器扩展插件

            ### Architecture
            - Gateway embedded into Python backend (removed Go dependency)
            - Agent service refactored into 6 submodules
            - Build pipeline cleaned up (removed copy-gateway.js)

            ### Features
            - Auto-hide launcher after startup
            - 3D character system improvements
            - Pixel-style UI enhancements
            - **NEW: Portable version support**

            ### Stability
            - Fixed file:// URL format issue causing production build to not launch
            - Steam module lazy loading to prevent native crashes
            - Google Fonts localized for offline/China network support
            - Global exception handling improvements
            - TypeScript type fixes

            Automated release by GitHub Actions
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
