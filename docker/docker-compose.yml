services:
  pero-backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: pero-backend
    restart: unless-stopped
    environment:
      - PERO_ENV=server
      - PORT=9120
    ports:
      - '9120:9120'
    volumes:
      - pero-data:/app/data
      - pero-workspace:/app/pero_workspace
    networks:
      - pero-network

  pero-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: pero-web
    restart: unless-stopped
    ports:
      - '8080:80'
    depends_on:
      pero-backend:
        condition: service_healthy
    networks:
      - pero-network

  pero-napcat:
    image: docker.io/napneko/napcat-docker:latest
    container_name: pero-napcat
    restart: unless-stopped
    environment:
      - ACCOUNT=${NAPCAT_ACCOUNT:-}
    volumes:
      - napcat-config:/app/config
    depends_on:
      pero-backend:
        condition: service_healthy
    networks:
      - pero-network

networks:
  pero-network:
    driver: bridge

volumes:
  pero-data:
  pero-workspace:
  napcat-config:
